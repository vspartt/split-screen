<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>split screen V1</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="game-container">

  <header class="game-header">
    <h1>🎬 Split Screen</h1>
    <div class="stats-bar">
      <span id="score-display" class="score">Score : 0 / 900</span>
      <span id="lives-display" class="lives">❤️❤️❤️</span>
    </div>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
  </header>

  <div class="grid">
    <div class="cell corner"></div>
    <div class="cell header col-header" id="col-header-0"></div>
    <div class="cell header col-header" id="col-header-1"></div>
    <div class="cell header col-header" id="col-header-2"></div>

    <div class="cell header row-header" id="row-header-0"></div>
    <div class="cell game-cell" data-row="0" data-col="0"></div>
    <div class="cell game-cell" data-row="0" data-col="1"></div>
    <div class="cell game-cell" data-row="0" data-col="2"></div>

    <div class="cell header row-header" id="row-header-1"></div>
    <div class="cell game-cell" data-row="1" data-col="0"></div>
    <div class="cell game-cell" data-row="1" data-col="1"></div>
    <div class="cell game-cell" data-row="1" data-col="2"></div>

    <div class="cell header row-header" id="row-header-2"></div>
    <div class="cell game-cell" data-row="2" data-col="0"></div>
    <div class="cell game-cell" data-row="2" data-col="1"></div>
    <div class="cell game-cell" data-row="2" data-col="2"></div>
  </div>

</div>

<!-- MODALE DE RECHERCHE -->
<div id="search-modal" class="modal-overlay hidden">
  <div class="modal-content">
    <button id="close-modal" class="close-btn">&times;</button>
    <h2 class="modal-title">Trouver un film</h2>
    <p id="cell-hint" style="color:#aaa;font-size:13px;margin:4px 0 10px;min-height:20px;text-align:center;"></p>
    <input type="text" id="search-input" class="search-input"
           placeholder="Ex: Parasite, Titanic, Scream…" autocomplete="off">
    <ul id="results-list" class="results-list"></ul>
  </div>
</div>
    <script  src="./script.js"></script>

  </body>
  
</html>
